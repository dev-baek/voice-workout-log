language: "en-US"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  poem: false
  path_filters:
    - "!docs/superpowers/specs/**"
    - "!**/spec.md"
    - "!**/*spec.md"
    - "!**/*-spec.md"
    - "!**/*.spec.md"
  path_instructions:
    - path: "src/**"
      instructions: |
        Review in English. Focus on user-visible behavior, browser/WebView compatibility,
        security boundaries, and clear error handling. Avoid style-only comments unless
        they materially improve maintainability.
    - path: "tests/**"
      instructions: |
        Review in English. Check that tests cover meaningful behavior, edge cases,
        and failure paths without becoming brittle.

chat:
  auto_reply: true
